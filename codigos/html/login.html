<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/login.css">
    <title>Document</title>
</head>

<body>
    <section>
        <div class="barraColorida"></div>
    </section>

    <main>
        <div class="colunaEsquerda">
            <img src="../img/login.png" alt="">
        </div>

        <div class="colunaDireita">
            <h1>Ocorrência+</h1>
            <div class="inputSenhaContainer">
                <input id="senha" type="password" placeholder="Digite sua senha...">
                <span id="toggleSenha" class="toggleSenha">
                    <svg id="iconEye" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                        fill="none">
                        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="black" stroke-width="2" />
                        <circle cx="12" cy="12" r="3" stroke="black" stroke-width="2" />
                    </svg>
                </span>
            </div>
            <button id="btnEntrar">Entrar</button>
        </div>
    </main>

    <script src="../js/login.js"></script>

</body>

</html>
