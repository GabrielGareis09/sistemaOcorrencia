<!DOCTYPE html>
<html lang="pt-br">

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
                rel="stylesheet">
        <link rel="stylesheet" href="../css/negativa.css">
        <title>Document</title>
</head>

<body>
        <section>
                <div class="barraColorida"></div>
        </section>

        <header class="areaNav">
                <div class="navBar">
                        <div class="logo">
                                <a href="../html/escolha.html">
                                        <h1>Ocorrência+</h1>
                                </a>
                        </div>
                        <div class="menu">
                                <img src="../img/menu.png" alt="" id="btnMenu">

                                <div class="menuDropdown" id="menuDropdown">
                                        <a href="../html/escolha.html">Home</a>
                                        <a href="../html/historico.html">Histórico</a>
                                        <a href="../html/login.html">Sair</a>
                                </div>
                        </div>
                </div>
        </header>

        <main>
                <div class="areaTitulo">
                        <h1>Ocorrência Negativa</h1>
                </div>

                <div class="faixaCard"></div>

                <div class="cardNegativa">
                        <div class="nomeEstudante">
                                <h1>Nome Estudante:</h1>
                                <input type="text" id="nomeEstudante" placeholder="Digite o nome...">
                        </div>

                        <div class="cgm">
                                <h1>CGM:</h1>
                                <input type="text" id="cgm" placeholder="Digite o CGM..." inputmode="numeric"
                                        maxlength="20">
                        </div>

                        <div class="serieTurma">
                                <h1>Série / Turma:</h1>
                                <select id="serieTurma">
                                        <option class="disciplinaDesat" disabled selected>Escolha a Série/Turma</option>
                                        <option>1º Ano A - Sala 101</option>
                                        <option>1º Ano B - Sala 102</option>
                                        <option>1º Ano C - Sala 103</option>
                                        <option>2º Ano A - Sala 201</option>
                                        <option>2º Ano B - Sala 202</option>
                                        <option>2º Ano C - Sala 203</option>
                                        <option>3º Ano A - Sala 301</option>
                                        <option>3º Ano B - Sala 302</option>
                                        <option>3º Ano C - Sala 303</option>
                                        <option>3º Ano D - Sala 304</option>
                                </select>
                        </div>

                        <div class="disciplina">
                                <h1>Disciplina:</h1>
                                <select id="disciplina">
                                        <option disabled selected>Escolha a Disciplina</option>
                                        <option>Matemática</option>
                                        <option>Língua Portuguesa</option>
                                        <option>História</option>
                                        <option>Geografia</option>
                                        <option>Ciências</option>
                                        <option>Biologia</option>
                                        <option>Química</option>
                                        <option>Física</option>
                                        <option>Inglês</option>
                                        <option>Educação Física</option>
                                </select>
                        </div>

                        <div class="profissionalCgm">
                                <h1>Profissional CGM:</h1>
                                <input type="text" id="profissionalCgm" placeholder="Digite o nome...">
                        </div>

                        <div class="data">
                                <h1>Data:</h1>
                                <input type="date" id="data">
                        </div>

                        <div class="areaFatoObservado">
                                <div class="titFatoObservado">
                                        <h1>FATO OBSERVADO (descrever de forma objetiva e sucinta)</h1>
                                </div>

                                <div class="textareaFatoObservado">
                                        <textarea id="fatoObservado"
                                                placeholder="Digite o Fato Observado..."></textarea>
                                </div>
                        </div>

                        <div class="areaBotoes">
                                <button type="button" class="btnLimpar">Limpar</button>
                                <button type="button" class="btnEnviar">Enviar</button>
                        </div>
                </div>
        </main>

        <script src="../js/negativa.js"></script>

</body>

</html>
